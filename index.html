<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velmora Ventures · Artisan perfumes</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Font: Inter clean & modern -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: #fbf9f5;
      color: #2b2b2b;
      line-height: 1.5;
    }

    /* reusable container */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* header */
    .site-header {
      padding: 1.2rem 0;
      border-bottom: 1px solid #eae4db;
      background-color: #ffffffd9;
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo a {
      font-size: 1.8rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: #3a2c29;
    }
    .logo span {
      font-weight: 300;
      color: #b2915d;
    }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.6rem;
      color: #3a2c29;
      transition: color 0.2s;
      padding: 0.5rem;
    }
    .cart-icon:hover {
      color: #b2915d;
    }
    .cart-count {
      position: absolute;
      top: -6px;
      right: -8px;
      background: #b2915d;
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      min-width: 20px;
      height: 20px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      border: 2px solid #fbf9f5;
    }

    /* hero */
    .hero {
      padding: 4rem 0 3rem;
      text-align: center;
      background: linear-gradient(145deg, #f5efe8 0%, #fcf9f5 100%);
    }
    .hero h2 {
      font-size: 2.8rem;
      font-weight: 350;
      letter-spacing: -0.02em;
      color: #1f1714;
    }
    .hero h2 i {
      color: #b2915d;
      font-size: 2.4rem;
      margin: 0 0.4rem;
    }
    .hero p {
      font-size: 1.2rem;
      color: #5c4e48;
      margin: 1rem 0 2rem;
    }
    .btn {
      display: inline-block;
      background-color: #3a2c29;
      color: white;
      padding: 0.85rem 2.5rem;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1rem;
    }
    .btn:hover {
      background-color: #b2915d;
    }

    /* product grid */
    .section-title {
      font-size: 2.2rem;
      font-weight: 350;
      margin: 2.5rem 0 1.5rem;
      color: #2b2b2b;
      text-align: center;
    }
    .section-title span {
      border-bottom: 2px solid #b2915d;
      padding-bottom: 0.3rem;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem;
      margin-bottom: 4rem;
    }

    .product-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.03);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #f0e8df;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 30px -8px rgba(98, 64, 48, 0.12);
    }

    .product-image {
      width: 100%;
      height: 240px;
      object-fit: cover;
      background-color: #e9dfd4;
      display: block;
    }

    .product-info {
      padding: 1.4rem 1.2rem 1.6rem;
    }
    .product-name {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
      color: #1f1714;
    }
    .product-price {
      font-size: 1.2rem;
      font-weight: 400;
      color: #b2915d;
      margin: 0.5rem 0 1rem;
    }
    .add-to-cart {
      width: 100%;
      background: #f3ede7;
      border: none;
      color: #2b2b2b;
      font-weight: 500;
      padding: 0.8rem;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .add-to-cart i {
      color: #b2915d;
    }
    .add-to-cart:hover {
      background: #b2915d;
      color: white;
    }
    .add-to-cart:hover i {
      color: white;
    }

    /* footer */
    .footer {
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid #eae4db;
      color: #6b5b53;
      font-size: 0.9rem;
      margin-top: 2rem;
    }

    /* ===== CART DRAWER ===== */
    .cart-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.25);
      backdrop-filter: blur(3px);
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s, visibility 0.3s;
      z-index: 99;
    }
    .cart-overlay.open {
      visibility: visible;
      opacity: 1;
    }

    .cart-drawer {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      max-width: 90vw;
      height: 100vh;
      background: white;
      box-shadow: -10px 0 30px rgba(0,0,0,0.1);
      transition: right 0.35s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #eee5db;
    }
    .cart-drawer.open {
      right: 0;
    }

    .cart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 1.5rem 0.8rem;
      border-bottom: 1px solid #ece3da;
    }
    .cart-header h3 {
      font-weight: 400;
      font-size: 1.4rem;
      color: #1f1714;
    }
    .close-cart {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: #7f6e64;
      transition: color 0.2s;
      padding: 0.2rem;
    }
    .close-cart:hover {
      color: #3a2c29;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.2rem;
      background: #fdfbf9;
    }

    .cart-item {
      display: flex;
      gap: 0.8rem;
      background: white;
      padding: 0.8rem;
      border-radius: 18px;
      margin-bottom: 0.8rem;
      border: 1px solid #f0e7de;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .cart-item-img {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #ddd2c7;
      object-fit: cover;
    }
    .cart-item-details {
      flex: 1;
    }
    .cart-item-title {
      font-weight: 500;
      margin-bottom: 4px;
      font-size: 1rem;
    }
    .cart-item-price {
      color: #b2915d;
      font-weight: 500;
      font-size: 0.95rem;
    }
    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 6px;
    }
    .cart-item-actions button {
      background: #f3ede7;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #2b2b2b;
      transition: 0.15s;
      font-size: 0.9rem;
    }
    .cart-item-actions button:hover {
      background: #b2915d;
      color: white;
    }
    .cart-item-qty {
      min-width: 24px;
      text-align: center;
      font-weight: 500;
    }
    .remove-item {
      background: transparent !important;
      color: #a2816e !important;
    }
    .remove-item:hover {
      background: #f3ede7 !important;
      color: #b1432e !important;
    }

    .cart-footer {
      padding: 1.2rem 1.5rem 2rem;
      border-top: 1px solid #ece3da;
      background: #faf7f3;
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }
    .checkout-btn {
      width: 100%;
      background: #3a2c29;
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .checkout-btn:hover {
      background: #b2915d;
    }
    .empty-cart-msg {
      text-align: center;
      color: #948579;
      padding: 3rem 1rem;
      font-style: italic;
    }

    /* misc */
    i.fa-spray-can, i.fa-cart-shopping {
      pointer-events: none;
    }
    button {
      user-select: none;
    }
  </style>
</head>
<body>
  <!-- site header -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <a href="#">Velmora <span>Ventures</span></a>
      </div>
      <div class="cart-icon" id="cartToggle">
        <i class="fas fa-cart-shopping"></i>
        <span class="cart-count" id="cartCount">0</span>
      </div>
    </div>
  </header>

  <!-- hero -->
  <section class="hero">
    <div class="container">
      <h2><i class="fas fa-spray-can"></i>  scent your story  <i class="fas fa-spray-can"></i></h2>
      <p>Artisan perfumes • Velmora Ventures</p>
      <a href="#products" class="btn">discover collection</a>
    </div>
  </section>

  <!-- product grid section -->
  <div class="container" id="products">
    <h2 class="section-title"><span>our signature scents</span></h2>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <!-- footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 Velmora Ventures — elegance in every bottle</p>
    </div>
  </footer>

  <!-- cart overlay & drawer -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3>your cart <i class="fas fa-spray-can" style="color: #b2915d; margin-left: 0.3rem;"></i></h3>
      <button class="close-cart" id="closeCart"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-items" id="cartItemsContainer">
      <!-- dynamic cart items appear here -->
      <div class="empty-cart-msg">Your cart feels light — add a fragrance ✧</div>
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Subtotal</span>
        <span id="cartTotalPrice">$0.00</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn">checkout (demo)</button>
    </div>
  </div>

  <script>
    (function() {
      // ---------- PRODUCT DATA (hardcoded with placeholder images) ----------
      const products = [
        { id: 'p1', name: 'Velvet Rose', price: 89, image: 'https://via.placeholder.com/400x400/6b4f3c/ffffff?text=Velvet+Rose' },
        { id: 'p2', name: 'Oud Wood', price: 120, image: 'https://via.placeholder.com/400x400/3a2c29/ffffff?text=Oud+Wood' },
        { id: 'p3', name: 'Citrus Breeze', price: 65, image: 'https://via.placeholder.com/400x400/d9b382/2b2b2b?text=Citrus+Breeze' },
        { id: 'p4', name: 'Amber Night', price: 110, image: 'https://via.placeholder.com/400x400/b85e3a/ffffff?text=Amber+Night' },
        { id: 'p5', name: 'Vanilla Bean', price: 75, image: 'https://via.placeholder.com/400x400/e8cfb2/2b2b2b?text=Vanilla+Bean' },
        { id: 'p6', name: 'Santal Blush', price: 99, image: 'https://via.placeholder.com/400x400/c9a9a0/2b2b2b?text=Santal+Blush' }
      ];

      // ---------- CART STATE ----------
      let cart = []; // each item = { id, name, price, quantity, image }

      // ---------- DOM elements ----------
      const productGrid = document.getElementById('productGrid');
      const cartCountSpan = document.getElementById('cartCount');
      const cartItemsContainer = document.getElementById('cartItemsContainer');
      const cartTotalSpan = document.getElementById('cartTotalPrice');
      const cartToggle = document.getElementById('cartToggle');
      const cartOverlay = document.getElementById('cartOverlay');
      const cartDrawer = document.getElementById('cartDrawer');
      const closeCartBtn = document.getElementById('closeCart');
      const checkoutBtn = document.getElementById('checkoutBtn');

      // ---------- render product cards ----------
      function renderProducts() {
        productGrid.innerHTML = products.map(prod => `
          <div class="product-card" data-id="${prod.id}">
            <img class="product-image" src="${prod.image}" alt="${prod.name}">
            <div class="product-info">
              <div class="product-name">${prod.name}</div>
              <div class="product-price">$${prod.price}</div>
              <button class="add-to-cart" data-id="${prod.id}"><i class="fas fa-cart-plus"></i> add to cart</button>
            </div>
          </div>
        `).join('');
      }

      // ---------- CART helpers ----------
      function updateCartCounter() {
        const totalQty = cart.reduce((acc, item) => acc + item.quantity, 0);
        cartCountSpan.textContent = totalQty;
      }

      function calculateSubtotal() {
        return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      }

      function updateCartTotalDisplay() {
        cartTotalSpan.textContent = `$${calculateSubtotal().toFixed(2)}`;
      }

      // render cart items inside drawer using current cart
      function renderCartItems() {
        if (!cart.length) {
          cartItemsContainer.innerHTML = `<div class="empty-cart-msg">Your cart feels light — add a fragrance ✧</div>`;
          return;
        }

        let html = '';
        cart.forEach(item => {
          html += `
            <div class="cart-item" data-id="${item.id}">
              <img class="cart-item-img" src="${item.image}" alt="${item.name}">
              <div class="cart-item-details">
                <div class="cart-item-title">${item.name}</div>
                <div class="cart-item-price">$${item.price}</div>
                <div class="cart-item-actions">
                  <button class="cart-qty-btn" data-action="dec" data-id="${item.id}"><i class="fas fa-minus"></i></button>
                  <span class="cart-item-qty">${item.quantity}</span>
                  <button class="cart-qty-btn" data-action="inc" data-id="${item.id}"><i class="fas fa-plus"></i></button>
                  <button class="remove-item" data-action="remove" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button>
                </div>
              </div>
            </div>
          `;
        });
        cartItemsContainer.innerHTML = html;
        updateCartTotalDisplay();
      }

      // Add to cart logic
      function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;

        const existing = cart.find(item => item.id === productId);
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({
            id: product.id,
            name: product.name,
            price: product.price,
            image: product.image,
            quantity: 1
          });
        }
        updateCartCounter();
        renderCartItems();   // refresh cart drawer if open
      }

      // handle quantity changes & remove
      function handleCartAction(e) {
        const target = e.target.closest('button');
        if (!target) return;
        const action = target.dataset.action;
        const productId = target.dataset.id;
        if (!productId) return;

        const cartItem = cart.find(i => i.id === productId);
        if (!cartItem) return;

        if (action === 'inc') {
          cartItem.quantity += 1;
        } else if (action === 'dec') {
          cartItem.quantity -= 1;
          if (cartItem.quantity <= 0) {
            cart = cart.filter(i => i.id !== productId);
          }
        } else if (action === 'remove') {
          cart = cart.filter(i => i.id !== productId);
        }

        // if cart becomes empty, we rely on renderCartItems showing empty message
        updateCartCounter();
        renderCartItems();
      }

      // open / close cart
      function openCart() {
        cartDrawer.classList.add('open');
        cartOverlay.classList.add('open');
        renderCartItems();   // ensure fresh data
      }

      function closeCart() {
        cartDrawer.classList.remove('open');
        cartOverlay.classList.remove('open');
      }

      // ---------- EVENT LISTENERS ----------
      // product grid add to cart (delegation)
      productGrid.addEventListener('click', (e) => {
        const addBtn = e.target.closest('.add-to-cart');
        if (addBtn) {
          const pid = addBtn.dataset.id;
          addToCart(pid);
          // optional: open cart drawer to show item added? we could, but we just open briefly? maybe not to annoy
          // but let's open cart so user sees it (makes sense for ecommerce)
          openCart(); 
        }
      });

      // cart actions (inc/dec/remove) using delegation inside cartItemsContainer
      cartItemsContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const action = btn.dataset.action;
        if (action && (action === 'inc' || action === 'dec' || action === 'remove')) {
          e.preventDefault();
          handleCartAction(e);
        }
      });

      // toggle cart from icon
      cartToggle.addEventListener('click', openCart);

      // close via overlay or close button
      cartOverlay.addEventListener('click', closeCart);
      closeCartBtn.addEventListener('click', closeCart);

      // checkout demo
      checkoutBtn.addEventListener('click', () => {
        if (cart.length === 0) {
          alert('Your cart is empty. Choose a lovely perfume!');
          return;
        }
        const total = calculateSubtotal().toFixed(2);
        alert(`✨ Thank you for shopping with Velmora Ventures! ✨\nSubtotal: $${total}\n(This is a demo — no payment taken.)`);
        // optional: keep cart as is, we don't reset for demo
      });

      // close drawer if escape key pressed
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && cartDrawer.classList.contains('open')) {
          closeCart();
        }
      });

      // smooth scroll for hero button
      document.querySelector('.hero .btn').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
      });

      // initial render
      renderProducts();
      updateCartCounter(); // cart is empty initially
    })();
  </script>
</body>
</html>
